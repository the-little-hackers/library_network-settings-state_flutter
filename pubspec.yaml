name: network_settings_state
description: Check whether Wi-Fi and mobile data are enabled in device settings — not just which network is currently active.
version: 0.1.4
homepage: https://github.com/the-little-hackers/library_network-settings-state_flutter
repository: https://github.com/the-little-hackers/library_network-settings-state_flutter
issue_tracker: https://github.com/the-little-hackers/library_network-settings-state_flutter/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.thelittlehackers.network_settings_state
        pluginClass: NetworkSettingsStatePlugin
      ios:
        pluginClass: NetworkSettingsStatePlugin
